    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

</body>
<script>
  // 1. 註冊插件
  gsap.registerPlugin(ScrollTrigger);

  // 2. 建立動畫
  gsap.from(".description p", {
    // 動態的起點狀態
    opacity: 0,
    y: 0,             // 從下方 30px 的位置開始
    duration: 1.2,     // 持續 1.2 秒
    ease: "power2.out",// 平滑的減速曲線
    stagger: 0.3,      // 讓元素一個接一個出現（間隔 0.3 秒）
    
    // 設定觸發條件
    scrollTrigger: {
      trigger: ".description", // 當看到這個區塊時觸發
      start: "top 50%",        // 當區塊頂部到達螢幕 80% 高度時開始
      toggleActions: "play none none none", // 只播放一次
      markers: false, // 顯示觸發點（開發時使用，完成後可以移除）
    }
  });
  gsap.from(".start-main", {
    scrollTrigger: {
      trigger: ".start-main", 
      start: "top 60%",       // 比文字稍晚一點觸發
      markers: false,
      toggleActions: "play none none reverse"
    },
    opacity: 0,
    scale: 0.5,               // 從一半大小開始變大
    duration: 0.8,
    ease: "back.out(1.7)"     // 帶有一點點彈跳感的效果
  });
</script>
